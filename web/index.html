<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Numbernama (Go)</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.2/dist/css/bootstrap.min.css"
        integrity="sha384-uWxY/CJNBR+1zjPWmfnSnVxwRheevXITnMqoEIeG1LJrdI0GlVs/9cVSyPYXdcSF" crossorigin="anonymous" />
    <style>
        .buttons {
            width: fit-content;
        }

        .list-group-item {
            background-color: black;
            border-color: rgba(202, 195, 162, 0.37);
            height: 45px;
            width: 45px;
            cursor: pointer;
        }

        li.list-group-item:hover {
            border-color: rgba(226, 91, 114, 0.877);
        }

        .numberDiv {
            height: calc(100vh - 100px);
            margin-top: 5px;
            overflow-y: auto;
            width: fit-content;
        }

        .n1,
        .n9 {
            color: #e7f79fd0;
        }

        .n2,
        .n8 {
            color: #85f164;
        }

        .n3,
        .n7 {
            color: #ac9edf;
        }

        .n4,
        .n6 {
            color: #eb0808;
        }

        .n5 {
            color: #3fe5eb;
        }

        .selected-box {
            background-color: antiquewhite;
            color: #0420f1fa;
        }
    </style>
</head>

<body>
    <h1 class="ms-3 mt-2">Numbernama — Go + WebSocket</h1>
    <button type="button" class="btn btn-primary collapse gameModal" data-bs-toggle="modal"
        data-bs-target="#staticBackdrop">Start the Game</button>
    <div class="modal fade" id="staticBackdrop" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1"
        aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Play</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">Select a mode.</div>
                <div class="modal-footer">
                    <button type="button" id="elem1to18" class="btn btn-dark" data-bs-dismiss="modal">1 – 18</button>
                    <button type="button" id="elem1to19" class="btn btn-dark" data-bs-dismiss="modal">1 – 19</button>
                </div>
            </div>
        </div>
    </div>

    <div class="container-md buttons">
        <button type="button" class="btn btn-outline-info check">Check</button>
        <button type="button" class="btn btn-outline-warning disabled undo">Undo</button>
        <button type="button" class="btn btn-outline-success disabled help">Help</button>
        <button type="button" class="btn btn-outline-secondary clear">Clear</button>
        <button type="button" class="btn btn-outline-danger restart">Restart</button>
    </div>
    <div class="container-md numberDiv"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
    <script src="/static/app.js"></script>
    <script>
        document.querySelector('button.gameModal').click();
    </script>
</body>

</html>
